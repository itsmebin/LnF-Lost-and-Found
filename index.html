<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>lnf · lost and found</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="hero">
            <h1>LnF - Lost and Found</h1>
            <p>report lost items · upload image · mark as found</p>
        </div>

        <!-- report form -->
        <div class="form-card">
            <form id="reportForm">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Item name *</label>
                        <input type="text" id="itemName" placeholder="e.g., Black Backpack" required>
                    </div>
                    <div class="input-group">
                        <label>Location *</label>
                        <input type="text" id="location" placeholder="Library, subway, park..." required>
                    </div>
                    <div class="input-group">
                        <label>Date *</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="input-group">
                        <label>Contact info *</label>
                        <input type="text" id="contact" placeholder="email or phone" required>
                    </div>
                    <div class="input-group full-width">
                        <label>Description *</label>
                        <textarea id="description" placeholder="Color, brand, distinctive marks..." required></textarea>
                    </div>
                    <div class="input-group full-width">
                        <label>📸 Upload image (jpg, png, jpeg)</label>
                        <div class="image-upload-area" id="imageUploadArea">
                            <input type="file" id="imageInput" accept="image/jpeg,image/png,image/jpg"
                                style="display: none;">
                            <div class="file-label" id="uploadTrigger">📁 Choose image &nbsp; <span
                                    style="font-size:12px;">(preview below)</span></div>
                            <div id="imagePreviewContainer"></div>
                        </div>
                        <small style="color:#6f8dab;">Optional but recommended — image will be stored with the
                            report</small>
                    </div>
                </div>
                <button type="submit" class="btn-submit">report lost item</button>
                <div id="formFeedback" class="form-feedback"></div>
            </form>
            <p style="font-size: 0.7rem; margin-top: 0.6rem; color:#7e95ab; text-align:center;">All items start as LOST
                · you can mark them found later</p>
        </div>

        <!-- items list header -->
        <div class="items-header">
            <h2>📋 reported items</h2>
            <div class="items-count" id="itemsCount">0 items</div>
        </div>
        <div id="itemsContainer" class="items-grid">
            <!-- empty state injected by js -->
        </div>
        <footer>data saved locally · images stored as Base64</footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
